<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veille Urbanisme Paris</title>
<script src="https://cdn.jsdelivr.net/npm/gridjs@5.0.2/dist/gridjs.umd.js" crossorigin="anonymous"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gridjs@5.0.2/dist/theme/mermaid.min.css" crossorigin="anonymous">
<style>
:root { color-scheme: light; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #f5f7fa; color: #1a1a2e; }

/* Login */
#login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #1F4E79 0%, #2d6da3 100%); }
.login-box { background: white; border-radius: 12px; padding: 40px; width: 340px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); text-align: center; }
.login-box h1 { font-size: 20px; color: #1F4E79; margin-bottom: 4px; }
.login-box p { font-size: 13px; color: #888; margin-bottom: 24px; }
.login-box input { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; outline: none; transition: border-color 0.2s; }
.login-box input:focus { border-color: #1F4E79; }
.login-box button { width: 100%; padding: 12px; margin-top: 12px; background: #1F4E79; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
.login-box button:hover { background: #163a5c; }
.login-error { color: #e74c3c; font-size: 12px; margin-top: 8px; display: none; }

/* App */
#app { display: none; padding: 20px; max-width: 1400px; margin: 0 auto; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.header-left h1 { font-size: 22px; color: #1F4E79; }
.header-left .date-info { font-size: 13px; color: #888; margin-top: 4px; }
.btn-logout { padding: 8px 16px; background: none; border: 1px solid #ccc; border-radius: 6px; font-size: 12px; color: #666; cursor: pointer; }
.btn-logout:hover { border-color: #1F4E79; color: #1F4E79; }

/* Stats */
.stats { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.stat-card { background: white; border-radius: 10px; padding: 16px 20px; flex: 1; min-width: 140px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.stat-card .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #888; margin-bottom: 4px; }
.stat-card .value { font-size: 28px; font-weight: 700; }
.stat-card.dp .value { color: #2980b9; }
.stat-card.pc .value { color: #e67e22; }
.stat-card.other .value { color: #7f8c8d; }
.stat-card.total .value { color: #1F4E79; }

/* Filters */
.filters { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.filters select, .filters input[type="text"], .filters input[type="date"] { padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; background: white; }
.filters select:focus, .filters input:focus { outline: none; border-color: #1F4E79; }
.filter-label { font-size: 12px; color: #666; font-weight: 600; }

/* Tabs */
.tabs { display: flex; gap: 0; margin-bottom: 0; }
.tab { padding: 10px 20px; background: #e8edf2; border: none; cursor: pointer; font-size: 13px; font-weight: 600; color: #666; border-radius: 8px 8px 0 0; transition: all 0.2s; }
.tab.active { background: white; color: #1F4E79; }
.tab .count { background: #1F4E79; color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; margin-left: 6px; }

/* Table container */
.table-container { background: white; border-radius: 0 8px 8px 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); padding: 16px; }

/* Loading */
#loading { text-align: center; padding: 60px; color: #888; }
.spinner { width: 40px; height: 40px; border: 4px solid #e0e0e0; border-top-color: #1F4E79; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Grid.js overrides */
.gridjs-wrapper { border: none !important; }
.gridjs-table { font-size: 12px; }
.gridjs-th { background: #1F4E79 !important; color: white !important; font-size: 11px !important; text-transform: uppercase; letter-spacing: 0.3px; }
.gridjs-td { padding: 8px 10px !important; vertical-align: top !important; }
.gridjs-tr:nth-child(even) { background: #f8fafc; }
.gridjs-tr:hover { background: #edf2f7 !important; }
.gridjs-footer { border-top: 1px solid #eee !important; }
.etat-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.etat-accorde { background: #d4edda; color: #155724; }
.etat-instruction { background: #fff3cd; color: #856404; }
.etat-refuse { background: #f8d7da; color: #721c24; }
.etat-other { background: #e2e3e5; color: #383d41; }

@media (max-width: 768px) {
  .stats { flex-direction: column; }
  .filters { flex-direction: column; align-items: stretch; }
  .tabs { flex-wrap: wrap; }
}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h1>Veille Urbanisme Paris</h1>
    <p>Autorisations d'urbanisme — Données quotidiennes</p>
    <input type="password" id="pwd" placeholder="Mot de passe" autocomplete="off">
    <button onclick="tryLogin()">Accéder</button>
    <div class="login-error" id="login-error">Mot de passe incorrect</div>
  </div>
</div>

<div id="app">
  <div class="header">
    <div class="header-left">
      <h1>Veille Urbanisme Paris</h1>
      <div class="date-info" id="date-info"></div>
    </div>
    <button class="btn-logout" onclick="logout()">Déconnexion</button>
  </div>

  <div class="stats" id="stats"></div>

  <div class="filters">
    <span class="filter-label">Date depuis :</span>
    <input type="date" id="filter-date">
    <span class="filter-label">Arrondissement :</span>
    <select id="filter-arr"><option value="">Tous</option></select>
    <span class="filter-label">État :</span>
    <select id="filter-etat"><option value="">Tous</option></select>
    <span class="filter-label">Recherche :</span>
    <input type="text" id="filter-search" placeholder="Adresse, objet, référence...">
  </div>

  <div class="tabs" id="tabs"></div>
  <div class="table-container">
    <div id="loading"><div class="spinner"></div>Chargement des données depuis opendata.paris.fr...</div>
    <div id="grid-wrapper"></div>
  </div>
</div>

<script>
/* ── Auth ── */
const PWD_HASH = '504cef';
function simpleHash(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) { h = ((h << 5) - h + s.charCodeAt(i)) | 0; }
  return Math.abs(h).toString(16).slice(0, 6);
}
function tryLogin() {
  if (simpleHash(document.getElementById('pwd').value) === PWD_HASH) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    localStorage.setItem('veille_auth', PWD_HASH);
    initApp();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}
function logout() {
  localStorage.removeItem('veille_auth');
  location.reload();
}
document.getElementById('pwd').addEventListener('keypress', e => { if (e.key === 'Enter') tryLogin(); });

/* ── API ── */
const API = 'https://opendata.paris.fr/api/explore/v2.1/catalog/datasets/dossiers-recents-durbanisme/records';
const FIELDS = 'nom_dossier,type_dossier,date_depot,adresse,commune,objet,demandeur,etat,date_decision,type_decision';
let allRecords = [];
let currentTab = 'all';

async function fetchAll(dateFrom) {
  let records = [], offset = 0;
  const where = `date_depot>="${dateFrom}"`;
  while (true) {
    const url = `${API}?where=${encodeURIComponent(where)}&select=${FIELDS}&limit=100&offset=${offset}&order_by=${encodeURIComponent('date_depot DESC, commune ASC')}`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`API error ${resp.status}`);
    const data = await resp.json();
    records = records.concat(data.results || []);
    if ((data.results || []).length < 100) break;
    offset += 100;
  }
  return records;
}

/* ── Helpers ── */
function yesterday() {
  const d = new Date(); d.setDate(d.getDate() - 1);
  return d.toISOString().slice(0, 10);
}
function formatDate(d) {
  if (!d) return '';
  const parts = d.split('-');
  return `${parts[2]}/${parts[1]}/${parts[0]}`;
}
function etatHtml(etat) {
  if (!etat) return '';
  let cls = 'etat-other';
  if (/accord/i.test(etat)) cls = 'etat-accorde';
  else if (/instruction|cours/i.test(etat)) cls = 'etat-instruction';
  else if (/refus|rejet/i.test(etat)) cls = 'etat-refuse';
  return `<span class="etat-badge ${cls}">${etat}</span>`;
}
function escapeHtml(s) {
  const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
}

/* ── Render ── */
function renderStats(records) {
  const dp = records.filter(r => /clar/i.test(r.type_dossier || '')).length;
  const pc = records.filter(r => /construire/i.test(r.type_dossier || '')).length;
  const other = records.length - dp - pc;
  document.getElementById('stats').innerHTML = `
    <div class="stat-card dp"><div class="label">Déclarations préalables</div><div class="value">${dp}</div></div>
    <div class="stat-card pc"><div class="label">Permis de construire</div><div class="value">${pc}</div></div>
    <div class="stat-card other"><div class="label">Autres (PA, PD, CU)</div><div class="value">${other}</div></div>
    <div class="stat-card total"><div class="label">Total</div><div class="value">${records.length}</div></div>
  `;
  return { dp, pc, other };
}

function renderTabs(counts) {
  const tabs = [
    { id: 'all', label: 'Tous', count: counts.dp + counts.pc + counts.other },
    { id: 'dp', label: 'Déclarations préalables', count: counts.dp },
    { id: 'pc', label: 'Permis de construire', count: counts.pc },
  ];
  if (counts.other > 0) tabs.push({ id: 'other', label: 'Autres', count: counts.other });
  document.getElementById('tabs').innerHTML = tabs.map(t =>
    `<button class="tab ${t.id === currentTab ? 'active' : ''}" onclick="switchTab('${t.id}')">${t.label}<span class="count">${t.count}</span></button>`
  ).join('');
}

function filterRecords() {
  let filtered = [...allRecords];
  if (currentTab === 'dp') filtered = filtered.filter(r => /clar/i.test(r.type_dossier || ''));
  else if (currentTab === 'pc') filtered = filtered.filter(r => /construire/i.test(r.type_dossier || ''));
  else if (currentTab === 'other') filtered = filtered.filter(r => !/clar|construire/i.test(r.type_dossier || ''));
  const arr = document.getElementById('filter-arr').value;
  if (arr) filtered = filtered.filter(r => String(r.commune) === arr);
  const etat = document.getElementById('filter-etat').value;
  if (etat) filtered = filtered.filter(r => r.etat === etat);
  const search = document.getElementById('filter-search').value.toLowerCase();
  if (search) filtered = filtered.filter(r =>
    [r.nom_dossier, r.adresse, r.objet, r.demandeur].some(v => (v || '').toLowerCase().includes(search))
  );
  return filtered;
}

function renderGrid(records) {
  document.getElementById('loading').style.display = 'none';
  const wrapper = document.getElementById('grid-wrapper');
  wrapper.innerHTML = '';
  const data = records.map(r => [
    r.nom_dossier || '',
    r.type_dossier || '',
    formatDate(r.date_depot),
    r.adresse || '',
    r.commune ? `${r.commune}e` : '',
    r.objet || '',
    r.etat || '',
    formatDate(r.date_decision),
    r.type_decision || '',
  ]);
  new gridjs.Grid({
    columns: [
      { name: 'Référence', width: '160px' },
      { name: 'Type', width: '130px' },
      { name: 'Dépôt', width: '90px' },
      { name: 'Adresse', width: '220px' },
      { name: 'Arrdt', width: '60px' },
      { name: 'Objet des travaux', width: '300px', formatter: (cell) => gridjs.html(`<div style="white-space:normal;line-height:1.4">${escapeHtml(cell)}</div>`) },
      { name: 'État', formatter: (cell) => gridjs.html(etatHtml(cell)), width: '130px' },
      { name: 'Décision', width: '90px' },
      { name: 'Type décision', width: '110px' },
    ],
    data,
    sort: true,
    pagination: { limit: 50 },
    language: {
      search: { placeholder: 'Rechercher...' },
      pagination: { previous: '←', next: '→', showing: 'Lignes', of: 'sur', to: 'à', results: () => 'résultats' },
      noRecordsFound: 'Aucun dossier trouvé',
    },
  }).render(wrapper);
}

function populateFilters(records) {
  const arrSel = document.getElementById('filter-arr');
  arrSel.innerHTML = '<option value="">Tous</option>';
  [...new Set(records.map(r => r.commune).filter(Boolean))].sort((a, b) => a - b)
    .forEach(a => { const o = document.createElement('option'); o.value = a; o.textContent = `${a}e`; arrSel.appendChild(o); });
  const etatSel = document.getElementById('filter-etat');
  etatSel.innerHTML = '<option value="">Tous</option>';
  [...new Set(records.map(r => r.etat).filter(Boolean))].sort()
    .forEach(e => { const o = document.createElement('option'); o.value = e; o.textContent = e; etatSel.appendChild(o); });
}

function refresh() { renderGrid(filterRecords()); }

window.switchTab = function(tab) {
  currentTab = tab;
  const tabs = document.querySelectorAll('.tab');
  tabs.forEach(t => t.classList.remove('active'));
  const idx = tab === 'all' ? 0 : tab === 'dp' ? 1 : tab === 'pc' ? 2 : 3;
  if (tabs[idx]) tabs[idx].classList.add('active');
  refresh();
};

document.getElementById('filter-arr').addEventListener('change', refresh);
document.getElementById('filter-etat').addEventListener('change', refresh);
let searchTimeout;
document.getElementById('filter-search').addEventListener('input', () => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(refresh, 300);
});

/* ── Date picker: reload data on change ── */
document.getElementById('filter-date').addEventListener('change', () => loadData(document.getElementById('filter-date').value));

/* ── Load data ── */
async function loadData(dateFrom) {
  if (!dateFrom) dateFrom = yesterday();
  document.getElementById('loading').style.display = 'block';
  document.getElementById('grid-wrapper').innerHTML = '';
  document.getElementById('date-info').textContent = `Dossiers déposés depuis le ${formatDate(dateFrom)} — Source : opendata.paris.fr`;
  try {
    allRecords = await fetchAll(dateFrom);
    const counts = renderStats(allRecords);
    renderTabs(counts);
    populateFilters(allRecords);
    currentTab = 'all';
    refresh();
  } catch (err) {
    document.getElementById('loading').innerHTML = `<p style="color:#e74c3c">Erreur de chargement : ${err.message}</p>`;
  }
}

function initApp() {
  const dateInput = document.getElementById('filter-date');
  dateInput.value = yesterday();
  loadData();
}

/* Auto-login if already authenticated */
if (localStorage.getItem('veille_auth') === PWD_HASH) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  initApp();
}
</script>
</body>
</html>
