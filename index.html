<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veille Urbanisme Paris</title>
<script src="https://cdn.jsdelivr.net/npm/gridjs@5.0.2/dist/gridjs.umd.js" crossorigin="anonymous"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gridjs@5.0.2/dist/theme/mermaid.min.css" crossorigin="anonymous">
<style>
:root { color-scheme: light; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #f5f7fa; color: #1a1a2e; }

#login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #1F4E79 0%, #2d6da3 100%); }
.login-box { background: white; border-radius: 12px; padding: 40px; width: 340px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); text-align: center; }
.login-box h1 { font-size: 20px; color: #1F4E79; margin-bottom: 4px; }
.login-box p { font-size: 13px; color: #888; margin-bottom: 24px; }
.login-box input { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; outline: none; }
.login-box input:focus { border-color: #1F4E79; }
.login-box button { width: 100%; padding: 12px; margin-top: 12px; background: #1F4E79; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
.login-box button:hover { background: #163a5c; }
.login-error { color: #e74c3c; font-size: 12px; margin-top: 8px; display: none; }

#app { display: none; padding: 20px; max-width: 1600px; margin: 0 auto; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.header-left h1 { font-size: 22px; color: #1F4E79; }
.header-left .subtitle { font-size: 13px; color: #888; margin-top: 2px; }
.btn-logout { padding: 8px 16px; background: none; border: 1px solid #ccc; border-radius: 6px; font-size: 12px; color: #666; cursor: pointer; }

.stats { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
.stat-card { background: white; border-radius: 10px; padding: 14px 18px; flex: 1; min-width: 130px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.stat-card .label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: #888; margin-bottom: 2px; }
.stat-card .value { font-size: 26px; font-weight: 700; color: #1F4E79; }

.legend { display: flex; gap: 16px; margin-bottom: 12px; flex-wrap: wrap; font-size: 12px; color: #555; }
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-dot { width: 14px; height: 14px; border-radius: 3px; }
.legend-dot.red { background: #f8d7da; border: 1px solid #f5c6cb; }
.legend-dot.yellow { background: #fff3cd; border: 1px solid #ffeeba; }
.legend-dot.green { background: #d4edda; border: 1px solid #c3e6cb; }

.filters { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
.filters select, .filters input { padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; background: white; }
.filters select:focus, .filters input:focus { outline: none; border-color: #1F4E79; }
.filter-label { font-size: 12px; color: #666; font-weight: 600; }

.tabs { display: flex; gap: 0; margin-bottom: 0; }
.tab { padding: 10px 24px; background: #e8edf2; border: none; cursor: pointer; font-size: 14px; font-weight: 600; color: #666; border-radius: 8px 8px 0 0; transition: all 0.2s; }
.tab.active { background: white; color: #1F4E79; }
.tab .count { background: #1F4E79; color: white; font-size: 10px; padding: 2px 7px; border-radius: 10px; margin-left: 6px; }

.table-container { background: white; border-radius: 0 8px 8px 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); padding: 16px; overflow-x: auto; }

#loading { text-align: center; padding: 60px; color: #888; }
.spinner { width: 40px; height: 40px; border: 4px solid #e0e0e0; border-top-color: #1F4E79; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }

.gridjs-wrapper { border: none !important; }
.gridjs-table { font-size: 12px; }
.gridjs-th { background: #1F4E79 !important; color: white !important; font-size: 11px !important; text-transform: uppercase; letter-spacing: 0.3px; }
.gridjs-td { padding: 8px 10px !important; vertical-align: top !important; }
.gridjs-tr:hover { background: #edf2f7 !important; }
.gridjs-footer { border-top: 1px solid #eee !important; }

.row-monument { background: #f8d7da !important; }
.row-monument:hover { background: #f5c6cb !important; }
.row-enseigne { background: #fff3cd !important; }
.row-enseigne:hover { background: #ffeeba !important; }
.row-luxe { background: #d4edda !important; }
.row-luxe:hover { background: #c3e6cb !important; }

.tag { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; margin: 1px; }
.tag-chantier { background: #e2e3e5; color: #383d41; }
.tag-monument { background: #f8d7da; color: #721c24; }
.tag-enseigne { background: #fff3cd; color: #856404; }
.tag-luxe { background: #d4edda; color: #155724; }
.tag-marque { background: #d1ecf1; color: #0c5460; }

@media (max-width: 768px) {
  .stats { flex-direction: column; }
  .filters { flex-direction: column; align-items: stretch; }
}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h1>Veille Urbanisme Paris</h1>
    <p>Autorisations d'urbanisme — Tableau de bord</p>
    <input type="password" id="pwd" placeholder="Mot de passe" autocomplete="off">
    <button onclick="tryLogin()">Accéder</button>
    <div class="login-error" id="login-error">Mot de passe incorrect</div>
  </div>
</div>

<div id="app">
  <div class="header">
    <div class="header-left">
      <h1>Veille Urbanisme Paris</h1>
      <div class="subtitle" id="subtitle"></div>
    </div>
    <button class="btn-logout" onclick="logout()">Déconnexion</button>
  </div>

  <div class="stats" id="stats"></div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot red"></div> Monument historique / MH</div>
    <div class="legend-item"><div class="legend-dot yellow"></div> Enseigne / devanture</div>
    <div class="legend-item"><div class="legend-dot green"></div> Luxe</div>
  </div>

  <div class="filters">
    <span class="filter-label">Arrondissement :</span>
    <select id="filter-arr"><option value="">Tous</option></select>
    <span class="filter-label">Couleur :</span>
    <select id="filter-color">
      <option value="">Toutes</option>
      <option value="monument">Monument (rouge)</option>
      <option value="enseigne">Enseigne (jaune)</option>
      <option value="luxe">Luxe (vert)</option>
    </select>
    <span class="filter-label">Recherche :</span>
    <input type="text" id="filter-search" placeholder="Adresse, objet, demandeur, référence...">
  </div>

  <div class="tabs" id="tabs"></div>
  <div class="table-container">
    <div id="loading"><div class="spinner"></div>Chargement des données...</div>
    <div id="grid-wrapper"></div>
  </div>
</div>

<script>
/* ── Auth ── */
const PWD_HASH = '504cef';
function simpleHash(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) { h = ((h << 5) - h + s.charCodeAt(i)) | 0; }
  return Math.abs(h).toString(16).slice(0, 6);
}
function tryLogin() {
  if (simpleHash(document.getElementById('pwd').value) === PWD_HASH) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    localStorage.setItem('veille_auth', PWD_HASH);
    initApp();
  } else { document.getElementById('login-error').style.display = 'block'; }
}
function logout() { localStorage.removeItem('veille_auth'); location.reload(); }
document.getElementById('pwd').addEventListener('keypress', e => { if (e.key === 'Enter') tryLogin(); });

/* ── Classification ── */
const LUXURY_BRANDS = ['LVMH','HERMES','HERMÈS','CHANEL','DIOR','GUCCI','VUITTON','CARTIER','ROLEX','BULGARI','PRADA','SAINT LAURENT','BALENCIAGA','CELINE','CÉLINE','GIVENCHY','KERING','FENDI','BOTTEGA','TIFFANY','BURBERRY','VALENTINO','ARMANI','VERSACE','LORO PIANA','RIMOWA','LOEWE','BERLUTI','MONCLER','BREGUET','TAG HEUER','OMEGA','PIAGET','BOUCHERON','VAN CLEEF','CHOPARD','RALPH LAUREN','LACOSTE','LONGCHAMP','SWAROVSKI','JIMMY CHOO','MONTBLANC','MOYNAT','CHLOE','CHLOÉ','LANVIN','BALMAIN','ISABEL MARANT','SANDRO','MAJE','ZADIG','ISABEL MARANT','JACQUEMUS'];

const RETAILER_BRANDS = ['MCDONALD','STARBUCKS','ZARA','H&M','SEPHORA','FNAC','MONOPRIX','CARREFOUR','FRANPRIX','UNIQLO','NIKE','APPLE','DECATHLON','IKEA','LEROY MERLIN','PICARD','BOULANGER','DARTY','PRIMARK','NESPRESSO','FOOT LOCKER','CELIO','PULL&BEAR','MASSIMO DUTTI','COURIR','GO SPORT','TANG FRERES','PARIS STORE','ALDI','LIDL','BIOCOOP','NATURALIA','ALINEA','CONFORAMA','BUT','CASTORAMA','BRICORAMA','BURGER KING','KFC','DOMINOS','FIVE GUYS','SUBWAY','PAUL','ERIC KAYSER','BOCUSE','FAUCHON','HEDIARD','LADUREE','LADURÉE','GALERIES LAFAYETTE','PRINTEMPS','BHV','BON MARCHE','SAMARITAINE','CITADIUM'];

const MONUMENT_KEYWORDS = /\b(historique|monument|histo|MH|classé|inscrit.{0,10}monument|ABF|architecte.{0,10}bâtiment.{0,10}france)\b/i;

const ENSEIGNE_KEYWORDS = /\b(enseigne|devanture|vitrine|store.?banne|auvent|marquise|bandeau|caisson.?lumineu|lettrage|logo.?fa[cç]ade|habillage.?fa[cç]ade)\b/i;

const CHANTIER_KEYWORDS = /\b(échafaudage|palissade|ravalement|sur[eé]l[eé]vation|construction.{0,20}bâtiment|démolition|restructuration|réhabilitation|extension.{0,10}R\+|gros.?[oœ]uvre|curage)\b/i;

function classifyRecord(r) {
  const obj = (r.obj || '').toUpperCase();
  const dem = (r.dem || '').toUpperCase();
  let tags = [];
  let color = '';

  // Monument (highest priority for color = red)
  if (MONUMENT_KEYWORDS.test(r.obj || '') || MONUMENT_KEYWORDS.test(r.dem || '')) {
    tags.push({ label: 'Monument historique', cls: 'tag-monument' });
    color = 'monument';
  }

  // Luxury
  const isLuxe = LUXURY_BRANDS.some(b => dem.includes(b));
  if (isLuxe) {
    tags.push({ label: 'Luxe', cls: 'tag-luxe' });
    if (!color) color = 'luxe';
  }

  // Enseigne / devanture
  const isEnseigne = ENSEIGNE_KEYWORDS.test(r.obj || '') || RETAILER_BRANDS.some(b => dem.includes(b));
  if (isEnseigne) {
    tags.push({ label: 'Enseigne', cls: 'tag-enseigne' });
    if (!color) color = 'enseigne';
  }

  // Chantier important
  if (CHANTIER_KEYWORDS.test(r.obj || '')) {
    tags.push({ label: 'Chantier', cls: 'tag-chantier' });
  }

  // Big brand (not luxury, not retailer but known)
  if (!isLuxe && !isEnseigne && RETAILER_BRANDS.some(b => dem.includes(b))) {
    tags.push({ label: 'Grande marque', cls: 'tag-marque' });
  }

  return { tags, color };
}

function analysisHtml(tags) {
  if (!tags.length) return '';
  return tags.map(t => `<span class="tag ${t.cls}">${t.label}</span>`).join(' ');
}

function escapeHtml(s) {
  const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML;
}

function formatDate(d) {
  if (!d) return '';
  const parts = d.split('-');
  if (parts.length !== 3) return d;
  return `${parts[2]}/${parts[1]}/${parts[0]}`;
}

/* ── State ── */
let allRecords = [];
let currentTab = 'demandes';
const API = 'https://opendata.paris.fr/api/explore/v2.1/catalog/datasets/dossiers-recents-durbanisme/records';

/* ── Fetch API (recent data with demandeur) ── */
async function fetchAPI() {
  let records = [], offset = 0;
  const fields = 'nom_dossier,type_dossier,date_depot,adresse,commune,objet,demandeur,etat,date_decision,type_decision';
  while (true) {
    const url = `${API}?select=${fields}&limit=100&offset=${offset}&order_by=${encodeURIComponent('date_depot DESC')}`;
    const resp = await fetch(url);
    if (!resp.ok) break;
    const data = await resp.json();
    const mapped = (data.results || []).map(r => ({
      ref: r.nom_dossier || '',
      dem: r.demandeur || '',
      adr: r.adresse || '',
      arr: r.commune || 0,
      obj: r.objet || '',
      dd: r.date_depot || '',
      dr: r.date_decision || '',
      etat: r.etat || '',
      typ: r.type_dossier || '',
    }));
    records = records.concat(mapped);
    if ((data.results || []).length < 100) break;
    offset += 100;
  }
  return records;
}

/* ── Merge & dedup ── */
function mergeData(historical, api) {
  const byRef = new Map();
  // Historical first
  for (const r of historical) { byRef.set(r.ref, r); }
  // API overwrites (more recent)
  for (const r of api) { if (r.ref) byRef.set(r.ref, r); }
  return Array.from(byRef.values());
}

/* ── Render ── */
function renderStats(records) {
  const demandes = records.filter(r => !r.dr && r.etat !== 'Accordé' && r.etat !== 'Refusé').length;
  const reponses = records.length - demandes;
  const monuments = records.filter(r => r._color === 'monument').length;
  const luxe = records.filter(r => r._color === 'luxe').length;
  const enseignes = records.filter(r => r._color === 'enseigne').length;
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="label">Total dossiers</div><div class="value">${records.length.toLocaleString('fr')}</div></div>
    <div class="stat-card"><div class="label">Demandes en cours</div><div class="value">${demandes.toLocaleString('fr')}</div></div>
    <div class="stat-card"><div class="label">Réponses</div><div class="value">${reponses.toLocaleString('fr')}</div></div>
    <div class="stat-card"><div class="label" style="color:#721c24">Monuments</div><div class="value" style="color:#721c24">${monuments}</div></div>
    <div class="stat-card"><div class="label" style="color:#856404">Enseignes</div><div class="value" style="color:#856404">${enseignes}</div></div>
    <div class="stat-card"><div class="label" style="color:#155724">Luxe</div><div class="value" style="color:#155724">${luxe}</div></div>
  `;
  return { demandes, reponses };
}

function renderTabs(counts) {
  document.getElementById('tabs').innerHTML = `
    <button class="tab ${currentTab === 'demandes' ? 'active' : ''}" onclick="switchTab('demandes')">Demandes<span class="count">${counts.demandes.toLocaleString('fr')}</span></button>
    <button class="tab ${currentTab === 'reponses' ? 'active' : ''}" onclick="switchTab('reponses')">Réponses<span class="count">${counts.reponses.toLocaleString('fr')}</span></button>
  `;
}

function isDemande(r) {
  return !r.dr && r.etat !== 'Accordé' && r.etat !== 'Refusé';
}

function filterRecords() {
  let filtered = currentTab === 'demandes'
    ? allRecords.filter(isDemande)
    : allRecords.filter(r => !isDemande(r));

  // Sort: demandes by date_depot desc, reponses by date_decision desc
  if (currentTab === 'demandes') {
    filtered.sort((a, b) => (b.dd || '').localeCompare(a.dd || ''));
  } else {
    filtered.sort((a, b) => (b.dr || '').localeCompare(a.dr || ''));
  }

  const arr = document.getElementById('filter-arr').value;
  if (arr) filtered = filtered.filter(r => String(r.arr) === arr);

  const color = document.getElementById('filter-color').value;
  if (color) filtered = filtered.filter(r => r._color === color);

  const search = document.getElementById('filter-search').value.toLowerCase();
  if (search) filtered = filtered.filter(r =>
    [r.ref, r.dem, r.adr, r.obj].some(v => (v || '').toLowerCase().includes(search))
  );
  return filtered;
}

function renderGrid(records) {
  document.getElementById('loading').style.display = 'none';
  const wrapper = document.getElementById('grid-wrapper');
  wrapper.innerHTML = '';

  const data = records.map(r => [
    r.ref,
    r.dem,
    r.adr,
    r.arr ? `${r.arr}e` : '',
    r.obj,
    r.dd,
    r.dr,
    r._tags,
    r._color,
  ]);

  new gridjs.Grid({
    columns: [
      { name: 'Référence', width: '155px' },
      { name: 'Demandeur', width: '160px' },
      { name: 'Adresse', width: '200px' },
      { name: 'Arrdt', width: '55px' },
      { name: 'Objet des travaux', width: '280px', formatter: (cell) => gridjs.html(`<div style="white-space:normal;line-height:1.4">${escapeHtml(cell)}</div>`) },
      { name: 'Date demande', width: '95px', formatter: (cell) => formatDate(cell) },
      { name: 'Date réponse', width: '95px', formatter: (cell) => formatDate(cell) },
      { name: 'Analyse', width: '140px', formatter: (cell) => gridjs.html(analysisHtml(cell)) },
      { name: 'color', hidden: true },
    ],
    data,
    sort: true,
    pagination: { limit: 100 },
    language: {
      pagination: { previous: '←', next: '→', showing: 'Lignes', of: 'sur', to: 'à', results: () => 'résultats' },
      noRecordsFound: 'Aucun dossier trouvé',
    },
    className: {
      tr: function(row, i) {
        if (!row || !row.cells) return '';
        const colorVal = row.cells[8] && row.cells[8].data;
        if (colorVal === 'monument') return 'row-monument';
        if (colorVal === 'enseigne') return 'row-enseigne';
        if (colorVal === 'luxe') return 'row-luxe';
        return '';
      }
    },
    style: { tr: { cursor: 'default' } },
  }).render(wrapper);

  // Apply row coloring after render
  setTimeout(applyRowColors, 500);
}

function applyRowColors() {
  const rows = document.querySelectorAll('.gridjs-tr');
  rows.forEach(row => {
    const cells = row.querySelectorAll('.gridjs-td');
    if (!cells.length) return;
    // Check analysis cell for tags
    const analysisCell = cells[7];
    if (!analysisCell) return;
    const html = analysisCell.innerHTML;
    if (html.includes('tag-monument')) {
      row.style.background = '#f8d7da';
    } else if (html.includes('tag-luxe') && !html.includes('tag-enseigne')) {
      row.style.background = '#d4edda';
    } else if (html.includes('tag-enseigne')) {
      row.style.background = '#fff3cd';
    }
  });
}

// Re-apply colors on pagination
const observer = new MutationObserver(() => setTimeout(applyRowColors, 100));

function populateFilters(records) {
  const arrSel = document.getElementById('filter-arr');
  arrSel.innerHTML = '<option value="">Tous</option>';
  [...new Set(records.map(r => r.arr).filter(Boolean))].sort((a, b) => a - b)
    .forEach(a => { const o = document.createElement('option'); o.value = a; o.textContent = `${a}e`; arrSel.appendChild(o); });
}

function refresh() {
  const filtered = filterRecords();
  renderGrid(filtered);
  // Observe grid for pagination changes
  const wrapper = document.getElementById('grid-wrapper');
  observer.disconnect();
  observer.observe(wrapper, { childList: true, subtree: true });
}

window.switchTab = function(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (tab === 'demandes' && i === 0) || (tab === 'reponses' && i === 1));
  });
  refresh();
};

document.getElementById('filter-arr').addEventListener('change', refresh);
document.getElementById('filter-color').addEventListener('change', refresh);
let searchTimeout;
document.getElementById('filter-search').addEventListener('input', () => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(refresh, 300);
});

/* ── Init ── */
async function initApp() {
  document.getElementById('subtitle').textContent = 'Chargement des données historiques + API...';
  try {
    // Load historical data
    const histResp = await fetch('data.json');
    const historical = histResp.ok ? await histResp.json() : [];

    // Load fresh API data
    let apiData = [];
    try { apiData = await fetchAPI(); } catch(e) { console.warn('API fetch failed:', e); }

    // Merge
    allRecords = mergeData(historical, apiData);

    // Classify all records
    allRecords.forEach(r => {
      const c = classifyRecord(r);
      r._tags = c.tags;
      r._color = c.color;
    });

    document.getElementById('subtitle').textContent = `${allRecords.length.toLocaleString('fr')} dossiers chargés — Source : opendata.paris.fr + historique`;

    const counts = renderStats(allRecords);
    renderTabs(counts);
    populateFilters(allRecords);
    refresh();
  } catch (err) {
    document.getElementById('loading').innerHTML = `<p style="color:#e74c3c">Erreur : ${err.message}</p>`;
  }
}

if (localStorage.getItem('veille_auth') === PWD_HASH) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  initApp();
}
</script>
</body>
</html>
